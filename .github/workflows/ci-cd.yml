name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: "CI 通过后是否部署到服务器"
        required: true
        default: false
        type: boolean
      ref:
        description: "要部署的 Git 引用"
        required: false
        default: "main"
        type: string

jobs:
  test:
    name: 测试
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 安装依赖
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: 编译 Python 源码
        run: |
          python -m compileall api.py main.py config.py rag

      - name: 运行单元测试
        run: |
          pytest tests/unit -q

      - name: 构建 Docker 镜像
        run: |
          docker build -t recipe-rag-assistant:ci .

  deploy:
    name: 部署
    runs-on: ubuntu-latest
    needs: test
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: 检出待部署代码
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: 打包部署归档
        run: |
          mkdir -p /tmp/recipe-rag-assistant-build
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='vector_index' \
            --exclude='eval/results.json' \
            --exclude='eval/report.md' \
            --exclude='release.tar.gz' \
            -czf /tmp/recipe-rag-assistant-build/release.tar.gz .

      - name: 上传归档到服务器
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "/tmp/recipe-rag-assistant-build/release.tar.gz"
          target: "/tmp/recipe-rag-assistant-release"
          overwrite: true

      - name: 在服务器上部署
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: APP_DIR,APP_ENV_FILE
          script: |
            set -e

            if [ -z "$APP_DIR" ]; then
              echo "SERVER_APP_DIR is not configured"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            tar -xzf /tmp/recipe-rag-assistant-release/release.tar.gz -C "$APP_DIR"

            cat > "$APP_DIR/.env" <<'EOF'
            $APP_ENV_FILE
            EOF

            cd "$APP_DIR"
            docker compose up -d --build
            docker image prune -f
