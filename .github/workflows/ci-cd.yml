name: CI/CD

concurrency:
  # Keep only the latest run for the same branch/ref to avoid queue buildup.
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
    # README/docs-only changes intentionally skip CI to keep routine pushes fast.
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after CI passes"
        required: true
        default: false
        type: boolean
      ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string

env:
  REGISTRY_ENDPOINT: ${{ secrets.SERVER_HOST }}:5000
  REGISTRY_PULL_ENDPOINT: 127.0.0.1:5000
  IMAGE_REPOSITORY: recipe-rag-assistant

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        # CI installs a pinned minimal dependency set instead of the full local runtime.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile Python sources
        run: |
          python -m compileall api.py main.py config.py rag

      - name: Run unit tests
        run: |
          pytest tests/unit -q

  image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only build/push images for explicit deploy flows.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Docker daemon for HTTP registry
        uses: docker/setup-docker-action@v4
        with:
          daemon-config: |
            {
              "insecure-registries": ["${{ env.REGISTRY_ENDPOINT }}"]
            }

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3
        with:
          buildkitd-config-inline: |
            [registry."${{ env.REGISTRY_ENDPOINT }}"]
              http = true
              insecure = true

      - name: Log in to local registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_ENDPOINT }}
          username: ${{ secrets.SERVER_REGISTRY_USERNAME }}
          password: ${{ secrets.SERVER_REGISTRY_PASSWORD }}

      - name: Build and push local-embedding image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY_ENDPOINT }}/${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
            ${{ env.REGISTRY_ENDPOINT }}/${{ env.IMAGE_REPOSITORY }}:latest
          cache-from: type=gha,scope=server-registry-image

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - image
    # Deploy uses the image produced in the same workflow run.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: Write compose file and deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          REGISTRY_USERNAME: ${{ secrets.SERVER_REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.SERVER_REGISTRY_PASSWORD }}
          IMAGE_NAME: ${{ env.REGISTRY_PULL_ENDPOINT }}/${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 60m
          envs: APP_DIR,APP_ENV_FILE,REGISTRY_USERNAME,REGISTRY_PASSWORD,IMAGE_NAME
          script: |
            set -e

            APP_DIR="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
            IMAGE_NAME="$(printf '%s' "$IMAGE_NAME" | tr -d '\r\n')"

            if [ -z "$APP_DIR" ]; then
              echo "SERVER_APP_DIR is not configured"
              exit 1
            fi

            if [ -z "$APP_ENV_FILE" ]; then
              echo "APP_ENV_FILE is empty"
              exit 1
            fi

            if [ -z "$IMAGE_NAME" ]; then
              echo "IMAGE_NAME is empty"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > docker-compose.yml <<'EOF'
            services:
              recipe-rag-assistant:
                image: ${IMAGE_NAME:-ghcr.io/reny-g/recipe-rag-assistant:latest}
                container_name: recipe-rag-assistant
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                environment:
                  EMBEDDING_PROVIDER: local
                  EMBEDDING_DEVICE: cpu
                  EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-true}
                volumes:
                  - ./data:/app/data:ro
                  - ./logs:/app/logs
                  - ./model_cache:/opt/huggingface
                  - ./vector_index:/app/vector_index
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
            EOF

            printf '%s\n' "$APP_ENV_FILE" > .env
            export IMAGE_NAME

            docker --version
            docker compose version

            echo "$REGISTRY_PASSWORD" | docker login 127.0.0.1:5000 -u "$REGISTRY_USERNAME" --password-stdin
            docker pull "$IMAGE_NAME"
            docker compose config
            docker compose up -d
            docker image prune -f --filter dangling=true
            docker logout 127.0.0.1:5000
