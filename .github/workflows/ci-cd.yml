name: CI/CD

on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy to the server after CI passes"
        required: true
        default: false
        type: boolean
      ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Compile Python sources
        run: |
          python -m compileall api.py main.py config.py rag

      - name: Run unit tests
        run: |
          pytest tests/unit -q

      - name: Build Docker image
        run: |
          docker build -t recipe-rag-assistant:ci .

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: test
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Create deployment archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.pytest_cache' \
            --exclude='__pycache__' \
            --exclude='.venv' \
            --exclude='venv' \
            --exclude='vector_index' \
            --exclude='eval/results.json' \
            --exclude='eval/report.md' \
            -czf release.tar.gz .

      - name: Upload release bundle
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "release.tar.gz"
          target: "/tmp/recipe-rag-assistant-release"
          overwrite: true

      - name: Deploy on remote server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          envs: APP_DIR,APP_ENV_FILE
          script: |
            set -e

            if [ -z "$APP_DIR" ]; then
              echo "SERVER_APP_DIR is not configured"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            tar -xzf /tmp/recipe-rag-assistant-release/release.tar.gz -C "$APP_DIR"

            cat > "$APP_DIR/.env" <<'EOF'
            $APP_ENV_FILE
            EOF

            cd "$APP_DIR"
            docker compose up -d --build
            docker image prune -f
