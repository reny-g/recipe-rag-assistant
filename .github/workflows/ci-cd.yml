name: CI/CD

concurrency:
  # Keep only the latest run for the same branch/ref to avoid queue buildup.
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after CI passes"
        required: true
        default: false
        type: boolean
      rebuild_base:
        description: "Rebuild the dependency base image"
        required: true
        default: false
        type: boolean
      ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/recipe-rag-assistant
  BASE_IMAGE_REPOSITORY: ${{ github.repository_owner }}/recipe-rag-assistant-base
  BASE_IMAGE_TAG: local-cpu-py312

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        # CI installs a pinned minimal dependency set instead of the full local runtime.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile Python sources
        run: |
          python -m compileall api.py main.py config.py rag

      - name: Run unit tests
        run: |
          pytest tests/unit -q

  image:
    name: Build and Push Image
    runs-on: ubuntu-latest
    needs: test
    # Only build/push images for explicit deploy flows.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))
    outputs:
      image_ref: ${{ steps.image_ref.outputs.image_ref }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Generate image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}
          tags: |
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image names
        id: names
        run: |
          echo "base_image=${{ env.IMAGE_REGISTRY }}/${{ env.BASE_IMAGE_REPOSITORY }}:${{ env.BASE_IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Check base image availability
        id: base_check
        run: |
          if docker buildx imagetools inspect "${{ steps.names.outputs.base_image }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push dependency base image
        # Rebuild the heavy local-embedding base only when missing or explicitly requested.
        if: >
          steps.base_check.outputs.exists != 'true' ||
          (github.event_name == 'workflow_dispatch' && inputs.rebuild_base) ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, '[rebuild-base]'))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ steps.names.outputs.base_image }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

      - name: Build and push local-embedding production image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          build-args: |
            BASE_IMAGE=${{ steps.names.outputs.base_image }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=app-image
          cache-to: type=gha,mode=max,scope=app-image

      - name: Record image reference
        id: image_ref
        run: |
          echo "image_ref=${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_REPOSITORY }}:sha-${{ github.sha }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - image
    # Deploy uses the image produced in the same workflow run.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Upload Compose files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          source: "docker-compose.yml"
          target: ${{ secrets.SERVER_APP_DIR }}
          overwrite: true

      - name: Pull image and deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          IMAGE_NAME: ${{ needs.image.outputs.image_ref }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 60m
          envs: APP_DIR,APP_ENV_FILE,IMAGE_NAME,GHCR_USERNAME,GHCR_TOKEN
          script: |
            set -e

            APP_DIR="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
            IMAGE_NAME="$(printf '%s' "$IMAGE_NAME" | tr -d '\r\n')"

            if [ -z "$APP_DIR" ]; then
              echo "SERVER_APP_DIR is not configured"
              exit 1
            fi

            if [ -z "$APP_ENV_FILE" ]; then
              echo "APP_ENV_FILE is empty"
              exit 1
            fi

            if [ -z "$IMAGE_NAME" ]; then
              echo "IMAGE_NAME is empty"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            printf '%s\n' "$APP_ENV_FILE" > .env
            export IMAGE_NAME

            docker --version
            docker compose version

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            docker pull "$IMAGE_NAME"
            docker compose config
            docker compose up -d
            docker image prune -f --filter dangling=true
            docker logout ghcr.io
