name: CI/CD

concurrency:
  # Keep only the latest run for the same branch/ref to avoid queue buildup.
  group: ci-cd-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

on:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "README.md"
      - "docs/**"
  pull_request:
    paths-ignore:
      - "README.md"
      - "docs/**"
  workflow_dispatch:
    inputs:
      deploy:
        description: "Deploy after CI passes"
        required: true
        default: false
        type: boolean
      rebuild_base:
        description: "Rebuild the dependency base image"
        required: true
        default: false
        type: boolean
      ref:
        description: "Git ref to deploy"
        required: false
        default: "main"
        type: string

env:
  IMAGE_REGISTRY: ghcr.io
  IMAGE_REPOSITORY: ${{ github.repository_owner }}/recipe-rag-assistant
  BASE_IMAGE_REPOSITORY: ${{ github.repository_owner }}/recipe-rag-assistant-base
  BASE_IMAGE_TAG: local-cpu-py312
  REPOSITORY_URL: ${{ github.server_url }}/${{ github.repository }}.git

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: requirements-ci.txt

      - name: Install dependencies
        # CI installs a pinned minimal dependency set instead of the full local runtime.
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Compile Python sources
        run: |
          python -m compileall api.py main.py config.py rag

      - name: Run unit tests
        run: |
          pytest tests/unit -q

  image:
    name: Ensure Base Image
    runs-on: ubuntu-latest
    needs: test
    # Only build/push images for explicit deploy flows.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Define image names
        id: names
        run: |
          echo "base_image=${{ env.IMAGE_REGISTRY }}/${{ env.BASE_IMAGE_REPOSITORY }}:${{ env.BASE_IMAGE_TAG }}" >> "$GITHUB_OUTPUT"

      - name: Check base image availability
        id: base_check
        run: |
          if docker buildx imagetools inspect "${{ steps.names.outputs.base_image }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push dependency base image
        # Rebuild the heavy local-embedding base only when missing or explicitly requested.
        if: >
          steps.base_check.outputs.exists != 'true' ||
          (github.event_name == 'workflow_dispatch' && inputs.rebuild_base) ||
          (github.event_name == 'push' && contains(github.event.head_commit.message, '[rebuild-base]'))
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ steps.names.outputs.base_image }}
          cache-from: type=gha,scope=base-image
          cache-to: type=gha,mode=max,scope=base-image

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs:
      - image
    # Deploy uses the image produced in the same workflow run.
    if: >
      (github.event_name == 'workflow_dispatch' && inputs.deploy) ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[deploy]'))

    steps:
      - name: Write compose file and deploy on server
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.SERVER_APP_DIR }}
          APP_ENV_FILE: ${{ secrets.APP_ENV_FILE }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BASE_IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.BASE_IMAGE_REPOSITORY }}:${{ env.BASE_IMAGE_TAG }}
          APP_IMAGE: recipe-rag-assistant:deploy-${{ github.sha }}
          REPOSITORY_URL: ${{ env.REPOSITORY_URL }}
          GIT_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.sha }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          command_timeout: 60m
          envs: APP_DIR,APP_ENV_FILE,GHCR_USERNAME,GHCR_TOKEN,BASE_IMAGE,APP_IMAGE,REPOSITORY_URL,GIT_REF
          script: |
            set -e

            APP_DIR="$(printf '%s' "$APP_DIR" | tr -d '\r\n')"
            BASE_IMAGE="$(printf '%s' "$BASE_IMAGE" | tr -d '\r\n')"
            APP_IMAGE="$(printf '%s' "$APP_IMAGE" | tr -d '\r\n')"
            REPOSITORY_URL="$(printf '%s' "$REPOSITORY_URL" | tr -d '\r\n')"
            GIT_REF="$(printf '%s' "$GIT_REF" | tr -d '\r\n')"

            if [ -z "$APP_DIR" ]; then
              echo "SERVER_APP_DIR is not configured"
              exit 1
            fi

            if [ -z "$APP_ENV_FILE" ]; then
              echo "APP_ENV_FILE is empty"
              exit 1
            fi

            if [ -z "$BASE_IMAGE" ]; then
              echo "BASE_IMAGE is empty"
              exit 1
            fi

            mkdir -p "$APP_DIR"
            cd "$APP_DIR"

            cat > docker-compose.yml <<'EOF'
            services:
              recipe-rag-assistant:
                image: ${IMAGE_NAME:-ghcr.io/reny-g/recipe-rag-assistant:latest}
                container_name: recipe-rag-assistant
                ports:
                  - "8000:8000"
                env_file:
                  - .env
                environment:
                  EMBEDDING_PROVIDER: local
                  EMBEDDING_DEVICE: cpu
                  EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-true}
                volumes:
                  - ./data:/app/data:ro
                  - ./logs:/app/logs
                  - ./model_cache:/opt/huggingface
                  - ./vector_index:/app/vector_index
                restart: unless-stopped
                healthcheck:
                  test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
                  interval: 30s
                  timeout: 10s
                  retries: 3
                  start_period: 60s
            EOF

            printf '%s\n' "$APP_ENV_FILE" > .env
            export IMAGE_NAME="$APP_IMAGE"

            docker --version
            docker compose version
            git --version

            echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin

            if ! docker image inspect "$BASE_IMAGE" >/dev/null 2>&1; then
              docker pull "$BASE_IMAGE"
            fi

            if [ ! -d repo/.git ]; then
              git clone --depth 1 "$REPOSITORY_URL" repo
            fi

            cd repo
            git fetch --depth 1 origin "$GIT_REF"
            git checkout --force FETCH_HEAD
            cd "$APP_DIR"

            docker build \
              -f repo/Dockerfile \
              --build-arg BASE_IMAGE="$BASE_IMAGE" \
              -t "$APP_IMAGE" \
              repo

            docker compose config
            docker compose up -d
            docker image prune -f --filter dangling=true
            docker logout ghcr.io
