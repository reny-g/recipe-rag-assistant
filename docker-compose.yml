services:
  recipe-rag-assistant:
    image: ${IMAGE_NAME:-ghcr.io/reny-g/recipe-rag-assistant:latest}
    container_name: recipe-rag-assistant
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      EMBEDDING_PROVIDER: local
      EMBEDDING_DEVICE: cpu
      EMBEDDING_LOCAL_FILES_ONLY: ${EMBEDDING_LOCAL_FILES_ONLY:-true}
    volumes:
      - ./data:/app/data:ro
      - ./logs:/app/logs
      - ./model_cache:/opt/huggingface
      - ./vector_index:/app/vector_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
